services:
  app:
    build: .
    ports:
      - "4000:4000"
    environment:
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - API_KEY=${API_KEY}
      - DATABASE_PATH=/data/w_core.db
      - PHX_HOST=${PHX_HOST:-localhost}
      - PHX_SERVER=true
    volumes:
      - sqlite_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  sqlite_data:
    driver: local
